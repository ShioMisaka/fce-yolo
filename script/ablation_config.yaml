# 公平消融实验配方（Fair Ablation Recipe）
# 所有 4 组模型共享的统一变量；修改此文件即可重做实验，无需改代码。
#
# 【工作流】跨机器（Linux 工作站训练 -> Windows 本地整理）：
#   工作站: python script/run_ablation.py --scales m          # 训练 -> runs/detect，整理 -> runs/outputs/m
#           zip -r fair_runs_m.zip runs/outputs runs/detect    # 打包回传（全英文，在 fce-yolo 仓库内）
#   本地:   解压 fair_runs_m.zip 到 fce-yolo/ 下（得到 runs/outputs、runs/detect）
#           python script/run_ablation.py --skip-train --local --scales m
#           # → 从 runs/outputs 读，整理到 实验/论文正式实验/main_ablation_fair/（中文目录，Windows OK）
#
# 输出根说明（run_ablation.py 自动选择，无需在此配置）：
# - 工作站（默认）：整理产物 → fce-yolo/runs/outputs/<scale>/（英文，打 zip 回传）
# - 本地（--local）：从 runs/outputs 读，整理到 实验/论文正式实验/main_ablation_fair/
# output_root 仅 --local 模式使用，工作站流程不读它。

# ===== 公平对比的统一变量（所有模型共享）=====
shared:
  data: /mnt/ssd1/Dataset/haixi_jixieshou/yolo_dataset/data.yaml
  imgsz: 1280
  batch: 32
  workers: 16
  optimizer: AdamW
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cache: ram
  seed: 42              # 固定种子，保证 4 组可复现、无运气差异
  deterministic: true   # 固定随机行为
  degrees: 10.0         # 统一数据增强（修复旧版 ④ 关掉 degrees 的不一致）
  # 其余增强用 ultralytics 默认（hsv/flip/mosaic 等）

# ===== 单阶段训练预算（2026-07-02 修订，原两阶段取消）=====
# 理由：fair 实验发现 freeze=10 压制了 FCE 新增的注意力模块。
#       全部 4 组改单阶段 300ep，排除 freeze 干扰，对齐旧版 main_ablation_m 的训练方式。
# config.py 里 4 个 ModelConfig 也已改为 stage1=None（单阶段），这里 stage1 段仅保留文档用途
# （build_model_cfg_with_fairness 会注入，但因 stage1=None，trainer 走单阶段分支不使用 stage1）。
stage1:
  epochs: 0
stage2:                 # 单阶段实际使用的配置
  epochs: 300           # 单阶段总预算
  lr0: 0.001
  cos_lr: true
  patience: 50
  close_mosaic: 20
freeze: 0               # 不冻结（单阶段）

# ===== 实验矩阵 =====
# 注意：n 尺度 FCE 是负增益（容量不足，注意力模块过参数化），历史数据
# n: FCE-baseline=-0.064；s/m/l/x 均为正。论文主推 m 尺度，本配方默认只跑 m。
# 如需跨尺度论证，改为 [m, s] 或 [m, s, l]。
scales: [m]
models: [baseline, bifpn, fce, fce_wiou]   # ①②③④ 消融阶梯

# IoU 损失显式映射（fce_wiou 走 WIoU，未列出的默认 CIoU）
iou_override:
  fce_wiou: WIoU

# ===== 输出 =====
# output_root: 仅 --local 模式（本地 Windows 整理）使用，工作站流程不读。
# 工作站整理根固定为 fce-yolo/runs/outputs（run_ablation.py 硬编码，无需配置）。
output_root: 实验/论文正式实验/main_ablation_fair
copy_stage1: false      # 默认只复制 stage2（节磁盘）；stage1 留 runs/detect/
total_epochs: 300       # 文档用途 = stage2.epochs（单阶段）
