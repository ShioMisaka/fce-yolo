# 公平消融实验配方（Fair Ablation Recipe）
# 所有 4 组模型共享的统一变量；修改此文件即可重做实验，无需改代码。
#
# 【工作流】跨机器（Linux 工作站训练 -> Windows 本地出图）：
#   工作站: python script/run_ablation.py --scale m          # 训练 -> runs/detect，整理 -> runs/outputs/fair_<ts>/
#           zip -r fair_<ts>.zip runs/outputs/fair_<ts>       # 打包单个时间戳文件夹回传
#   本地:   解压 fair_<ts>.zip 到 fce-yolo/ 下（得到 runs/outputs/fair_<ts>/）
#           直接打开 fair_<ts>/ 查看（解压即用）
#           若要重出图: python script/run_ablation.py --replot fair_<ts>
#
# 输出根说明：run_ablation.py 自动创建 runs/outputs/fair_<YYYYMMDD_HHMMSS>/，
# 无需在此配置 output_root（已删除该字段）。

# ===== 公平对比的统一变量（所有模型共享）=====
shared:
  data: /mnt/ssd1/Dataset/haixi_jixieshou/yolo_dataset/data.yaml
  imgsz: 1280
  batch: 32
  workers: 16
  optimizer: AdamW
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cache: ram
  seed: 42              # 固定种子，保证 4 组可复现、无运气差异
  deterministic: true   # 固定随机行为
  degrees: 10.0         # 统一数据增强（修复旧版 ④ 关掉 degrees 的不一致）
  # 其余增强用 ultralytics 默认（hsv/flip/mosaic 等）

# ===== 两阶段训练预算（2026-07-03 修订，恢复两阶段）=====
# 理由（详见 2026-07-03 根因分析）：
#   2026-07-02 把 stage1 取消改单阶段后，fair 实验全面倒挂（①→④ 不再递增）。
#   根因：BiFPN_Concat / BiCoordCrossAtt 是新增模块，从 yolo11m.pt 按层名匹配
#   迁移不到任何权重（intersect_dicts 丢弃），单阶段 300ep 学不充分；旧版递增
#   靠的是 stage1 给新增模块预热。取消 stage1 等于丢掉这个起跑优势。
# 本次修订：恢复两阶段，但 freeze=0（不冻结 backbone，避免旧版 freeze=10 冻住
#   注意力层5/8 的问题），让新增模块与 backbone 一起预热；lr0 同 stage2（0.001，
#   freeze=0 时保护预训练权重不被大 lr 破坏）。4 组全部两阶段（含 baseline），
#   变量完全统一，是真·公平对比。
stage1:
  epochs: 50            # 新增模块预热（与旧版 stage1 预算一致）
  lr0: 0.001            # freeze=0 时保守学习率，保护 yolo11m.pt 预训练权重
  cos_lr: true
  patience: 50
  close_mosaic: 0       # 预热期保持 mosaic 增强，让新增模块见多样样本
stage2:                 # 端到端微调
  epochs: 250           # 250 + 50 = 300 总预算（对齐旧版/单阶段总轮数）
  lr0: 0.001
  cos_lr: true
  patience: 50
  close_mosaic: 20
freeze: 0               # 不冻结（全解冻，避免冻住层5/8注意力模块）

# ===== 实验矩阵 =====
# 注意：n 尺度 FCE 是负增益（容量不足，注意力模块过参数化），历史数据
# n: FCE-baseline=-0.064；s/m/l/x 均为正。论文主推 m 尺度，本配方默认只跑 m。
# 如需跨尺度论证，改为 [m, s] 或 [m, s, l]。
scales: [m]
models: [baseline, bifpn, fce, fce_wiou]   # ①②③④ 消融阶梯

# IoU 损失显式映射（fce_wiou 走 WIoU，未列出的默认 CIoU）
iou_override:
  fce_wiou: WIoU

# ===== 输出 =====
# run_ablation.py 自动创建 runs/outputs/fair_<ts>/，无需配置 output_root。
copy_stage1: false      # 默认只复制 stage2（节磁盘）；stage1 留 runs/detect/
total_epochs: 300       # 文档用途 = stage1.epochs + stage2.epochs（两阶段）
