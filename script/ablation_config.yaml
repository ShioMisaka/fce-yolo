# 公平消融实验配方（Fair Ablation Recipe）
# 所有 4 组模型共享的统一变量；修改此文件即可重做实验，无需改代码。
# 详见 docs/superpowers/specs/2026-07-01-fair-ablation-training-design.md
#
# 【工作流】跨机器（Linux 工作站训练 -> Windows 本地整理）：
#   工作站: python script/run_ablation.py --scales m      # 训练 -> runs/detect
#           python script/run_ablation.py export --scales m  # 打包 -> <export_root>/m
#           tar -czf fair_runs_m.tar.gz fce-yolo/<export_root>/m
#   本地:   解压后 python script/run_ablation.py --skip-train --source fair_runs --scales m
#
# - export_root: 工作站训练产物打包目录（相对 fce-yolo 仓库根，纯英文）。
#                训练在 runs/detect 完成，export 子命令把 stage2 复制到此，便于打包回传。
# - output_root: 本地最终整理目录（相对项目根 Visual Guidance Robotic Arm/）。
#                本地 --skip-train --source fair_runs 时，从这里读结果、写对比表+图表。
#                本地是 Windows，路径含中文无妨；工作站只用 export_root，不碰 output_root。

# ===== 公平对比的统一变量（所有模型共享）=====
shared:
  data: /mnt/ssd1/Dataset/haixi_jixieshou/yolo_dataset/data.yaml
  imgsz: 1280
  batch: 32
  workers: 16
  optimizer: AdamW
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cache: ram
  seed: 42              # 固定种子，保证 4 组可复现、无运气差异
  deterministic: true   # 固定随机行为
  degrees: 10.0         # 统一数据增强（修复旧版 ④ 关掉 degrees 的不一致）
  # 其余增强用 ultralytics 默认（hsv/flip/mosaic 等）

# ===== 单阶段训练预算（2026-07-02 修订，原两阶段取消）=====
# 理由：fair 实验发现 freeze=10 压制了 FCE 新增的注意力模块。
#       全部 4 组改单阶段 300ep，排除 freeze 干扰，对齐旧版 main_ablation_m 的训练方式。
# config.py 里 4 个 ModelConfig 也已改为 stage1=None（单阶段），这里 stage1 段仅保留文档用途
# （build_model_cfg_with_fairness 会注入，但因 stage1=None，trainer 走单阶段分支不使用 stage1）。
stage1:
  epochs: 0
stage2:                 # 单阶段实际使用的配置
  epochs: 300           # 单阶段总预算
  lr0: 0.001
  cos_lr: true
  patience: 50
  close_mosaic: 20
freeze: 0               # 不冻结（单阶段）

# ===== 实验矩阵 =====
# 注意：n 尺度 FCE 是负增益（容量不足，注意力模块过参数化），历史数据
# n: FCE-baseline=-0.064；s/m/l/x 均为正。论文主推 m 尺度，本配方默认只跑 m。
# 如需跨尺度论证，改为 [m, s] 或 [m, s, l]。
scales: [m]
models: [baseline, bifpn, fce, fce_wiou]   # ①②③④ 消融阶梯

# IoU 损失显式映射（fce_wiou 走 WIoU，未列出的默认 CIoU）
iou_override:
  fce_wiou: WIoU

# ===== 输出 =====
# 工作站打包目录（相对 fce-yolo 仓库根，纯英文，export 子命令写入）
export_root: fair_runs
# 本地最终整理目录（相对项目根，Windows 本地用）
output_root: 实验/论文正式实验/main_ablation_fair
copy_stage1: false      # 默认只复制 stage2（节磁盘）；stage1 留 runs/detect/
total_epochs: 300       # 文档用途 = stage1.epochs + stage2.epochs
